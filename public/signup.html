<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Zentra AI</title>
    <meta name="description" content="Create a Zentra AI user account.">
    
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <!-- Glowing Background Effects -->
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="auth-wrapper">
        <div class="auth-card reveal active">
            <!-- Brand Logo -->
            <a href="index.html" class="logo auth-card-logo">
                <span class="logo-icon"><i class="fa-solid fa-cube"></i></span>
                <span class="logo-text">ZENTRA <span class="accent">AI</span></span>
            </a>
            
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Register to begin your custom project blueprint.</p>
            
            <!-- Credentials Form -->
            <form class="auth-form" id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Business Email</label>
                    <input type="email" id="email" placeholder="email@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="signup-submit-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-icon"><i class="fa-solid fa-user-plus"></i></span>
                </button>
                
                <div class="form-feedback" id="signup-feedback"></div>
            </form>

            <div class="auth-separator"><span>OR</span></div>

            <!-- Google OAuth Button -->
            <div class="google-auth-button-container">
                <div id="g_id_onload"
                     data-client_id="359359481405-cbuspr0m3klfs7grkbd6pba5vf4ij24f.apps.googleusercontent.com"
                     data-context="signup"
                     data-ux_mode="popup"
                     data-callback="handleGoogleCredentialResponse"
                     data-auto_select="false"
                     data-itp_support="true">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="filled_black"
                     data-text="signup_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="100%">
                </div>
            </div>

            <p class="auth-footer-text">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Global Google Identity callback function
        function handleGoogleCredentialResponse(response) {
            const feedback = document.getElementById('signup-feedback');
            
            // Send OAuth token to Express backend API
            fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    feedback.className = 'form-feedback success';
                    feedback.innerText = 'Google authorization successful. Redirecting...';
                    feedback.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    feedback.className = 'form-feedback error';
                    feedback.innerText = data.message || 'Google signup failed.';
                    feedback.style.display = 'block';
                }
            })
            .catch(err => {
                console.error(err);
                feedback.className = 'form-feedback error';
                feedback.innerText = 'Server error occurred during Google Auth.';
                feedback.style.display = 'block';
            });
        }
    </script>
</body>
</html>
